<!DOCTYPE html>
<html>
<head>
<style>
  body {
    font-family: sans-serif;
    background: #fff;
    padding: 40px;
    display: flex;
    gap: 40px;
    align-items: flex-start;
  }
  .icon-box { text-align: center; }
  img {
    width: 80px;
    height: 80px;
    display: block;
    margin-bottom: 10px;
    border: 1px solid #e5e5e5;
    border-radius: 12px;
    padding: 12px;
  }
  .num {
    font-size: 11px;
    color: #22c55e;
    font-weight: 600;
    margin-bottom: 4px;
  }
  p {
    font-size: 11px;
    color: #888;
    margin: 0;
    max-width: 80px;
  }
</style>
</head>
<body>
  <div class="icon-box">
    <div class="num">01</div>
    <img src="analyse.svg" alt="Analyse">
    <p>Analyse</p>
  </div>
  <div class="icon-box">
    <div class="num">02</div>
    <img src="konzeption.svg" alt="Konzeption">
    <p>Konzeption</p>
  </div>
  <div class="icon-box">
    <div class="num">03</div>
    <img src="integration.svg" alt="Integration">
    <p>Integration</p>
  </div>
  <div class="icon-box">
    <div class="num">04</div>
    <img src="optimierung.svg" alt="Optimierung">
    <p>Optimierung</p>
  </div>
</body>
</html>
