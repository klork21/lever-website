<!DOCTYPE html>
<html>
<head>
<style>
  body {
    font-family: sans-serif;
    background: #fff;
    padding: 40px;
    display: flex;
    gap: 40px;
    align-items: flex-start;
  }
  .icon-box {
    text-align: center;
  }
  img {
    width: 80px;
    height: 80px;
    display: block;
    margin-bottom: 10px;
    border: 1px solid #e5e5e5;
    border-radius: 12px;
    padding: 12px;
  }
  p {
    font-size: 11px;
    color: #888;
    margin: 0;
    max-width: 80px;
  }
</style>
</head>
<body>
  <div class="icon-box">
    <img src="lead-gen-specialist.svg" alt="Lead Gen">
    <p>Lead-Gen Specialist</p>
  </div>
  <div class="icon-box">
    <img src="onboarding-buddy.svg" alt="Onboarding">
    <p>Onboarding Buddy</p>
  </div>
  <div class="icon-box">
    <img src="corporate-brain.svg" alt="Corporate Brain">
    <p>Corporate Brain</p>
  </div>
  <div class="icon-box">
    <img src="legal-admin-analyst.svg" alt="Legal Admin">
    <p>Legal & Admin Analyst</p>
  </div>
  <div class="icon-box">
    <img src="report-insights-agent.svg" alt="Report">
    <p>Report & Insights Agent</p>
  </div>
</body>
</html>
