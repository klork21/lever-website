<svg viewBox="0 0 600 500" fill="none" xmlns="http://www.w3.org/2000/svg" width="600" height="500">
  <defs>
    <linearGradient id="ob-fl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#0a0a0a" stop-opacity="1"/>
      <stop offset="32%" stop-color="#0a0a0a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ob-fr" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%"  stop-color="#0a0a0a" stop-opacity="0.7"/>
      <stop offset="20%" stop-color="#0a0a0a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ob-ft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#0a0a0a" stop-opacity="1"/>
      <stop offset="16%" stop-color="#0a0a0a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ob-fb" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%"  stop-color="#0a0a0a" stop-opacity="1"/>
      <stop offset="16%" stop-color="#0a0a0a" stop-opacity="0"/>
    </linearGradient>
    <style>
      .ob-la { animation: ob-bA 11s ease-in-out        infinite; }
      .ob-lb { animation: ob-bB 13s ease-in-out  1.4s  infinite; }
      .ob-lc { animation: ob-bC  9s ease-in-out  2.8s  infinite; }
      .ob-ld { animation: ob-bB 14s ease-in-out  0.7s  infinite; }
      .ob-le { animation: ob-bA 10s ease-in-out  2.1s  infinite; }
      .ob-lf { animation: ob-bD 12s ease-in-out  3.5s  infinite; }
      .ob-da { animation: ob-dP  8s ease-in-out        infinite; }
      .ob-db { animation: ob-dP 10s ease-in-out  1.2s  infinite; }
      .ob-dc { animation: ob-dP  7s ease-in-out  2.5s  infinite; }
      .ob-dd { animation: ob-dP  9s ease-in-out  3.8s  infinite; }
      .ob-de { animation: ob-dP 11s ease-in-out  0.6s  infinite; }
      .ob-ra { animation: ob-rP  8s ease-in-out        infinite; }
      .ob-rb { animation: ob-rP 10s ease-in-out  1.2s  infinite; }
      .ob-rc { animation: ob-rP  7s ease-in-out  2.5s  infinite; }
      @keyframes ob-bA { 0%,100%{opacity:0.88} 50%{opacity:0.08} }
      @keyframes ob-bB { 0%,100%{opacity:0.75} 50%{opacity:0.06} }
      @keyframes ob-bC { 0%,100%{opacity:0.96} 50%{opacity:0.10} }
      @keyframes ob-bD { 0%,100%{opacity:0.80} 50%{opacity:0.07} }
      @keyframes ob-dP { 0%,100%{opacity:1.00} 50%{opacity:0.12} }
      @keyframes ob-rP { 0%,100%{opacity:0.30;r:16px} 50%{opacity:0.03;r:8px} }
    </style>
  </defs>

  <!--
    Chat-bubble outlines — 3 nested bubble shapes, each breathing at a different rate.
    Bubble = rounded-rect body + tail pointing bottom-left.
    Scaled to fill the 600x500 canvas; edge fades cut off extremes softly.
  -->

  <!-- Bubble 1 — outermost, lightest -->
  <path class="ob-la"
    d="M 105 70
       L 510 70  Q 555 70  555 112
       L 555 295 Q 555 337 510 337
       L 205 337 L 175 385 L 158 337
       L 105 337 Q 60  337  60  295
       L 60  112 Q 60  70  105 70 Z"
    stroke="#4ade80" stroke-width="1.3" stroke-linejoin="round"/>

  <!-- Bubble 2 — middle -->
  <path class="ob-lb"
    d="M 122 92
       L 487 92  Q 527 92  527 130
       L 527 278 Q 527 315 487 315
       L 212 315 L 186 357 L 170 315
       L 122 315 Q 82  315  82  278
       L 82  130 Q 82  92  122 92 Z"
    stroke="#22c55e" stroke-width="2.0" stroke-linejoin="round"/>

  <!-- Bubble 3 — innermost, strongest -->
  <path class="ob-lc"
    d="M 148 120
       L 458 120 Q 492 120 492 152
       L 492 258 Q 492 290 458 290
       L 222 290 L 200 328 L 186 290
       L 148 290 Q 114 290 114 258
       L 114 152 Q 114 120 148 120 Z"
    stroke="#16a34a" stroke-width="2.2" stroke-linejoin="round"/>

  <!-- Three dots inside (like the icon) — at center of bubble 3 body -->
  <!-- Dot left -->
  <circle class="ob-ra" cx="232" cy="205" r="14" fill="#4ade80"/>
  <circle class="ob-da" cx="232" cy="205" r="7"  fill="#4ade80"/>
  <!-- Dot center -->
  <circle class="ob-rb" cx="303" cy="205" r="13" fill="#22c55e"/>
  <circle class="ob-db" cx="303" cy="205" r="6.5" fill="#22c55e"/>
  <!-- Dot right -->
  <circle class="ob-rc" cx="374" cy="205" r="12" fill="#4ade80"/>
  <circle class="ob-dc" cx="374" cy="205" r="6"  fill="#4ade80"/>

  <!-- Subtle extra detail lines inside bubble -->
  <line class="ob-ld" x1="148" y1="162" x2="492" y2="162" stroke="#86efac" stroke-width="0.8"/>
  <line class="ob-le" x1="148" y1="248" x2="492" y2="248" stroke="#86efac" stroke-width="0.8"/>

  <!-- Edge fades -->
  <rect x="0" y="0" width="600" height="500" fill="url(#ob-fl)"/>
  <rect x="0" y="0" width="600" height="500" fill="url(#ob-fr)"/>
  <rect x="0" y="0" width="600" height="500" fill="url(#ob-ft)"/>
  <rect x="0" y="0" width="600" height="500" fill="url(#ob-fb)"/>
</svg>
