<svg viewBox="0 0 600 500" fill="none" xmlns="http://www.w3.org/2000/svg" width="600" height="500">
  <defs>
    <linearGradient id="la-fl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#0a0a0a" stop-opacity="1"/>
      <stop offset="32%" stop-color="#0a0a0a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="la-fr" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%"  stop-color="#0a0a0a" stop-opacity="0.7"/>
      <stop offset="20%" stop-color="#0a0a0a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="la-ft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#0a0a0a" stop-opacity="1"/>
      <stop offset="16%" stop-color="#0a0a0a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="la-fb" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%"  stop-color="#0a0a0a" stop-opacity="1"/>
      <stop offset="16%" stop-color="#0a0a0a" stop-opacity="0"/>
    </linearGradient>
    <style>
      .la-la { animation: la-bA 11s ease-in-out        infinite; }
      .la-lb { animation: la-bB 13s ease-in-out  1.4s  infinite; }
      .la-lc { animation: la-bC  9s ease-in-out  2.8s  infinite; }
      .la-ld { animation: la-bB 14s ease-in-out  0.7s  infinite; }
      .la-le { animation: la-bA 10s ease-in-out  2.1s  infinite; }
      .la-lf { animation: la-bD 12s ease-in-out  3.5s  infinite; }
      .la-lg { animation: la-bB 11s ease-in-out  4.2s  infinite; }
      .la-lh { animation: la-bC 15s ease-in-out  1.0s  infinite; }
      .la-li { animation: la-bA 13s ease-in-out  5.5s  infinite; }
      .la-da { animation: la-dP  8s ease-in-out        infinite; }
      .la-db { animation: la-dP 10s ease-in-out  1.2s  infinite; }
      .la-dc { animation: la-dP  7s ease-in-out  2.5s  infinite; }
      .la-ra { animation: la-rP  8s ease-in-out        infinite; }
      .la-rb { animation: la-rP 10s ease-in-out  1.2s  infinite; }
      .la-rc { animation: la-rP  7s ease-in-out  2.5s  infinite; }
      @keyframes la-bA { 0%,100%{opacity:0.88} 50%{opacity:0.08} }
      @keyframes la-bB { 0%,100%{opacity:0.75} 50%{opacity:0.06} }
      @keyframes la-bC { 0%,100%{opacity:0.96} 50%{opacity:0.10} }
      @keyframes la-bD { 0%,100%{opacity:0.80} 50%{opacity:0.07} }
      @keyframes la-dP { 0%,100%{opacity:1.00} 50%{opacity:0.12} }
      @keyframes la-rP { 0%,100%{opacity:0.30;r:16px} 50%{opacity:0.03;r:8px} }
    </style>
  </defs>

  <!--
    Magnifying glass over a document.
    Document: x 95–370, y 75–450, folded top-right corner at (325,75)→(325,120)→(370,120).
    Lens: circle cx=348 cy=248 r=130. Handle: 45° from lens edge to lower-right.
  -->

  <!-- === DOCUMENT OUTLINE (with folded corner) === -->
  <path class="la-la"
    d="M 95 75 L 325 75 L 370 120 L 370 450 L 95 450 Z"
    stroke="#22c55e" stroke-width="2.0" stroke-linejoin="round"/>

  <!-- Fold crease detail -->
  <path class="la-lb"
    d="M 325 75 L 325 120 L 370 120"
    stroke="#16a34a" stroke-width="1.6" stroke-linejoin="round"/>

  <!-- === TEXT LINES (representing document content) === -->
  <!-- Full-width lines -->
  <line class="la-lf" x1="118" y1="148" x2="345" y2="148" stroke="#22c55e"  stroke-width="1.3"/>
  <line class="la-lg" x1="118" y1="184" x2="292" y2="184" stroke="#86efac"  stroke-width="0.8"/>
  <line class="la-lf" x1="118" y1="220" x2="345" y2="220" stroke="#22c55e"  stroke-width="1.3"/>
  <line class="la-lh" x1="118" y1="256" x2="318" y2="256" stroke="#86efac"  stroke-width="0.8"/>
  <line class="la-lf" x1="118" y1="292" x2="345" y2="292" stroke="#22c55e"  stroke-width="1.3"/>
  <line class="la-lg" x1="118" y1="328" x2="262" y2="328" stroke="#86efac"  stroke-width="0.8"/>
  <line class="la-lf" x1="118" y1="364" x2="345" y2="364" stroke="#22c55e"  stroke-width="1.3"/>
  <line class="la-lh" x1="118" y1="400" x2="298" y2="400" stroke="#86efac"  stroke-width="0.8"/>
  <line class="la-li" x1="118" y1="432" x2="195" y2="432" stroke="#86efac"  stroke-width="0.7"/>

  <!-- === MAGNIFYING GLASS === -->
  <!-- Ghost ring (outer, softer) -->
  <circle class="la-ld"
    cx="348" cy="248" r="148"
    stroke="#4ade80" stroke-width="1.3" fill="none"/>
  <!-- Main lens circle -->
  <circle class="la-lc"
    cx="348" cy="248" r="130"
    stroke="#16a34a" stroke-width="2.4" fill="none"/>

  <!-- === HANDLE === -->
  <!--
    Direction: 45° from center (348,248).
    Edge point: (348+92, 248+92) = (440, 340).
    Tip: (522, 428).
  -->
  <line class="la-le"
    x1="440" y1="340" x2="522" y2="428"
    stroke="#22c55e" stroke-width="3.0" stroke-linecap="round"/>
  <!-- Handle highlight (thinner, brighter) -->
  <line class="la-lf"
    x1="436" y1="338" x2="518" y2="426"
    stroke="#4ade80" stroke-width="1.2" stroke-linecap="round"/>

  <!-- === NODES === -->
  <!-- Center of lens — main analysis point -->
  <circle class="la-ra" cx="348" cy="248" r="16"  fill="#16a34a"/>
  <circle class="la-da" cx="348" cy="248" r="5.5" fill="#16a34a"/>
  <!-- Document fold corner -->
  <circle class="la-rb" cx="370" cy="120" r="13"  fill="#4ade80"/>
  <circle class="la-db" cx="370" cy="120" r="4"   fill="#4ade80"/>
  <!-- Handle tip -->
  <circle class="la-rc" cx="522" cy="428" r="11"  fill="#22c55e"/>
  <circle class="la-dc" cx="522" cy="428" r="3.5" fill="#22c55e"/>

  <!-- Edge fades -->
  <rect x="0" y="0" width="600" height="500" fill="url(#la-fl)"/>
  <rect x="0" y="0" width="600" height="500" fill="url(#la-fr)"/>
  <rect x="0" y="0" width="600" height="500" fill="url(#la-ft)"/>
  <rect x="0" y="0" width="600" height="500" fill="url(#la-fb)"/>
</svg>
